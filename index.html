<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f7eedf" />
    <title>Three.js Waving Character</title>
    <style>
      :root {
        --cream: #f7eedf;
        --cream-deep: #efd9b8;
        --grass: #8cc76f;
        --grass-shadow: #6ba54e;
        --text: #7d4f28;
        --ui-bg: rgba(255, 250, 240, 0.88);
        --ui-border: rgba(125, 79, 40, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #fff7ec 0%, var(--cream) 58%, #f0e2ca 100%);
        font-family: "Trebuchet MS", "Avenir Next", "Hiragino Sans", sans-serif;
        color: var(--text);
      }

      body {
        position: relative;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hud {
        position: absolute;
        top: max(16px, env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 420px);
        padding: 14px 16px;
        border: 1px solid var(--ui-border);
        border-radius: 20px;
        background: var(--ui-bg);
        backdrop-filter: blur(10px);
        text-align: center;
        box-shadow: 0 12px 32px rgba(125, 79, 40, 0.08);
        pointer-events: none;
      }

      .hud h1 {
        margin: 0;
        font-size: clamp(1.1rem, 4vw, 1.55rem);
        line-height: 1.15;
        letter-spacing: 0.02em;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: clamp(0.82rem, 3vw, 0.95rem);
        opacity: 0.82;
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <h1>Three.js waving character</h1>
      <p>Drag to rotate / Pinch to zoom</p>
    </div>
    <div id="app"></div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.166.1";
      import { OrbitControls } from "https://esm.sh/three@0.166.1/examples/jsm/controls/OrbitControls.js";

      const container = document.getElementById("app");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf7eedf);
      scene.fog = new THREE.Fog(0xf7eedf, 9, 16);

      const camera = new THREE.PerspectiveCamera(
        35,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 2.45, 7.6);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.minDistance = 6;
      controls.maxDistance = 9.2;
      controls.minPolarAngle = 0.85;
      controls.maxPolarAngle = 1.35;
      controls.target.set(0, 1.55, 0);
      controls.rotateSpeed = 0.75;
      controls.zoomSpeed = 0.9;

      const ambientLight = new THREE.HemisphereLight(0xfff5e8, 0x95bb72, 1.7);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.55);
      keyLight.position.set(4.2, 7.5, 4.8);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.set(1024, 1024);
      keyLight.shadow.camera.near = 1;
      keyLight.shadow.camera.far = 20;
      keyLight.shadow.camera.left = -5;
      keyLight.shadow.camera.right = 5;
      keyLight.shadow.camera.top = 5;
      keyLight.shadow.camera.bottom = -5;
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0xffddb6, 0.5);
      fillLight.position.set(-4, 3, 2);
      scene.add(fillLight);

      const ground = new THREE.Mesh(
        new THREE.CylinderGeometry(5.2, 5.5, 0.36, 48),
        new THREE.MeshStandardMaterial({
          color: 0x88c86a,
          roughness: 0.95,
        })
      );
      ground.position.y = -0.18;
      ground.receiveShadow = true;
      scene.add(ground);

      const grassTop = new THREE.Mesh(
        new THREE.CircleGeometry(5, 48),
        new THREE.MeshStandardMaterial({
          color: 0x96d773,
          roughness: 1,
        })
      );
      grassTop.rotation.x = -Math.PI / 2;
      grassTop.position.y = 0.002;
      grassTop.receiveShadow = true;
      scene.add(grassTop);

      const character = new THREE.Group();
      scene.add(character);

      const skin = new THREE.MeshStandardMaterial({ color: 0xffdcc5, roughness: 0.95 });
      const hair = new THREE.MeshStandardMaterial({ color: 0x252226, roughness: 1 });
      const cardigan = new THREE.MeshStandardMaterial({ color: 0xe9d8ba, roughness: 1 });
      const shirt = new THREE.MeshStandardMaterial({ color: 0xfffdfa, roughness: 0.95 });
      const skirt = new THREE.MeshStandardMaterial({ color: 0xec7b17, roughness: 0.96 });
      const ribbon = new THREE.MeshStandardMaterial({ color: 0xff8918, roughness: 0.92 });
      const sock = new THREE.MeshStandardMaterial({ color: 0xf7f3ee, roughness: 1 });
      const shoe = new THREE.MeshStandardMaterial({ color: 0x4c3025, roughness: 0.92 });
      const sole = new THREE.MeshStandardMaterial({ color: 0x2f1b15, roughness: 1 });
      const eyeDark = new THREE.MeshStandardMaterial({ color: 0x37251f, roughness: 1 });
      const eyeGold = new THREE.MeshStandardMaterial({ color: 0xffc21e, roughness: 0.7, emissive: 0x6b3b00, emissiveIntensity: 0.16 });
      const eyeSpark = new THREE.MeshStandardMaterial({ color: 0xfff7cf, roughness: 0.5, emissive: 0xffee99, emissiveIntensity: 0.26 });
      const mouthMat = new THREE.MeshStandardMaterial({ color: 0xf48f82, roughness: 0.95 });
      const blush = new THREE.MeshStandardMaterial({
        color: 0xf7b1ae,
        roughness: 1,
        transparent: true,
        opacity: 0.5,
      });
      const button = new THREE.MeshStandardMaterial({ color: 0x5d3627, roughness: 1 });

      const body = new THREE.Group();
      character.add(body);

      const torso = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.34, 0.4, 8, 16),
        shirt
      );
      torso.scale.set(0.96, 1.05, 0.78);
      torso.position.y = 1.28;
      torso.castShadow = true;
      body.add(torso);

      const vest = new THREE.Mesh(
        new THREE.BoxGeometry(0.56, 0.62, 0.34),
        shirt
      );
      vest.position.set(0, 1.28, 0.01);
      vest.castShadow = true;
      body.add(vest);

      const collarLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.14, 0.03),
        shirt
      );
      collarLeft.position.set(-0.1, 1.54, 0.22);
      collarLeft.rotation.z = 0.55;
      body.add(collarLeft);

      const collarRight = collarLeft.clone();
      collarRight.position.x = 0.1;
      collarRight.rotation.z = -0.55;
      body.add(collarRight);

      const cardiganLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.33, 0.86, 0.3),
        cardigan
      );
      cardiganLeft.position.set(-0.2, 1.2, 0.02);
      cardiganLeft.rotation.z = 0.08;
      cardiganLeft.castShadow = true;
      body.add(cardiganLeft);

      const cardiganRight = cardiganLeft.clone();
      cardiganRight.position.x = 0.2;
      cardiganRight.rotation.z = -0.08;
      body.add(cardiganRight);

      const cardiganHemLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.24, 0.22),
        cardigan
      );
      cardiganHemLeft.position.set(-0.29, 0.79, 0.03);
      cardiganHemLeft.rotation.z = -0.18;
      body.add(cardiganHemLeft);

      const cardiganHemRight = cardiganHemLeft.clone();
      cardiganHemRight.position.x = 0.29;
      cardiganHemRight.rotation.z = 0.18;
      body.add(cardiganHemRight);

      for (const y of [1.38, 1.11, 0.85]) {
        const cardiganButton = new THREE.Mesh(
          new THREE.CylinderGeometry(0.04, 0.04, 0.04, 16),
          button
        );
        cardiganButton.rotation.x = Math.PI / 2;
        cardiganButton.position.set(-0.16, y, 0.2);
        body.add(cardiganButton);
      }

      const ribbonCenter = new THREE.Mesh(
        new THREE.SphereGeometry(0.085, 16, 16),
        ribbon
      );
      ribbonCenter.position.set(0, 1.37, 0.24);
      body.add(ribbonCenter);

      const ribbonLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.24, 0.12, 0.05),
        ribbon
      );
      ribbonLeft.position.set(-0.15, 1.38, 0.22);
      ribbonLeft.rotation.z = 0.6;
      body.add(ribbonLeft);

      const ribbonRight = ribbonLeft.clone();
      ribbonRight.position.x = 0.15;
      ribbonRight.rotation.z = -0.6;
      body.add(ribbonRight);

      const ribbonTailLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.26, 0.04),
        ribbon
      );
      ribbonTailLeft.position.set(-0.05, 1.18, 0.21);
      ribbonTailLeft.rotation.z = 0.12;
      body.add(ribbonTailLeft);

      const ribbonTailRight = ribbonTailLeft.clone();
      ribbonTailRight.position.x = 0.05;
      ribbonTailRight.rotation.z = -0.12;
      body.add(ribbonTailRight);

      const skirtBand = new THREE.Mesh(
        new THREE.CylinderGeometry(0.26, 0.28, 0.12, 20),
        skirt
      );
      skirtBand.position.set(0, 0.86, 0.01);
      body.add(skirtBand);

      const skirtGroup = new THREE.Group();
      skirtGroup.position.set(0, 0.7, 0.03);
      body.add(skirtGroup);

      for (let i = 0; i < 10; i += 1) {
        const pleat = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.26, 0.06),
          skirt
        );
        const t = -0.48 + i * 0.11;
        pleat.position.set(t, 0, 0.02 + Math.abs(t) * 0.12);
        pleat.rotation.z = t * 0.18;
        pleat.rotation.y = t * -0.12;
        pleat.castShadow = true;
        skirtGroup.add(pleat);
      }

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.9, 32, 32),
        skin
      );
      head.scale.set(1, 1.02, 0.95);
      head.position.y = 2.36;
      head.castShadow = true;
      character.add(head);

      const hairCap = new THREE.Mesh(
        new THREE.SphereGeometry(0.96, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.6),
        hair
      );
      hairCap.position.set(0, 2.64, -0.02);
      hairCap.rotation.x = -0.06;
      hairCap.castShadow = true;
      character.add(hairCap);

      const backHair = new THREE.Mesh(
        new THREE.CylinderGeometry(0.68, 0.8, 0.82, 28),
        hair
      );
      backHair.position.set(0, 2.02, -0.12);
      backHair.scale.set(1, 1, 0.58);
      backHair.castShadow = true;
      character.add(backHair);

      const sideHairLeft = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.25, 0.42, 6, 14),
        hair
      );
      sideHairLeft.scale.set(1.12, 1.36, 0.75);
      sideHairLeft.position.set(-0.76, 2.08, 0.18);
      sideHairLeft.rotation.z = 0.18;
      sideHairLeft.castShadow = true;
      character.add(sideHairLeft);

      const sideHairRight = sideHairLeft.clone();
      sideHairRight.position.x = 0.76;
      sideHairRight.rotation.z = -0.18;
      character.add(sideHairRight);

      const tipLeft = new THREE.Mesh(
        new THREE.ConeGeometry(0.14, 0.34, 16),
        hair
      );
      tipLeft.position.set(-0.73, 1.63, 0.18);
      tipLeft.rotation.z = 0.95;
      tipLeft.castShadow = true;
      character.add(tipLeft);

      const tipRight = tipLeft.clone();
      tipRight.position.x = 0.73;
      tipRight.rotation.z = -0.95;
      character.add(tipRight);

      for (const [x, y, z, sx] of [
        [0, 2.5, 0.67, 1.2],
        [-0.26, 2.37, 0.7, 0.72],
        [0.26, 2.37, 0.7, 0.72],
      ]) {
        const fringe = new THREE.Mesh(
          new THREE.SphereGeometry(0.24, 20, 20),
          hair
        );
        fringe.scale.set(sx, 0.55, 0.52);
        fringe.position.set(x, y, z);
        fringe.castShadow = true;
        character.add(fringe);
      }

      for (const [x, rot] of [
        [-0.32, -0.08],
        [-0.12, -0.03],
        [0.1, 0.04],
        [0.3, 0.09],
      ]) {
        const bang = new THREE.Mesh(
          new THREE.ConeGeometry(0.1, 0.34, 12),
          hair
        );
        bang.position.set(x, 2.22, 0.78);
        bang.rotation.x = Math.PI;
        bang.rotation.z = rot;
        bang.castShadow = true;
        character.add(bang);
      }

      const bunBase = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 16, 16),
        hair
      );
      bunBase.position.set(-0.68, 2.95, 0.02);
      character.add(bunBase);

      const bunLoop = new THREE.Mesh(
        new THREE.TorusGeometry(0.12, 0.035, 10, 18, Math.PI * 1.25),
        hair
      );
      bunLoop.position.set(-0.84, 3.08, 0.07);
      bunLoop.rotation.z = 0.75;
      character.add(bunLoop);

      const clipRed = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 14, 14),
        new THREE.MeshStandardMaterial({ color: 0xf15445, roughness: 0.9 })
      );
      clipRed.position.set(0.47, 2.63, 0.72);
      character.add(clipRed);

      const clipBarLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.045, 0.03),
        new THREE.MeshStandardMaterial({ color: 0xffc547, roughness: 0.9 })
      );
      clipBarLeft.position.set(0.35, 2.62, 0.71);
      clipBarLeft.rotation.z = -0.3;
      character.add(clipBarLeft);

      const clipBarRight = clipBarLeft.clone();
      clipBarRight.position.x = 0.59;
      clipBarRight.rotation.z = 0.3;
      character.add(clipBarRight);

      function createEye(x) {
        const eye = new THREE.Group();
        eye.position.set(x, 2.28, 0.77);

        const sclera = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 20, 20),
          shirt
        );
        sclera.scale.set(1, 1.14, 0.36);
        eye.add(sclera);

        const iris = new THREE.Mesh(
          new THREE.SphereGeometry(0.145, 18, 18),
          eyeGold
        );
        iris.scale.set(1, 1.08, 0.28);
        iris.position.set(0, -0.01, 0.08);
        eye.add(iris);

        const pupil = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 14, 14),
          eyeDark
        );
        pupil.scale.set(0.9, 1.05, 0.28);
        pupil.position.set(0, 0.02, 0.13);
        eye.add(pupil);

        for (const angle of [0, Math.PI / 2, Math.PI / 4, -Math.PI / 4]) {
          const sparkle = new THREE.Mesh(
            new THREE.BoxGeometry(0.028, 0.11, 0.02),
            eyeSpark
          );
          sparkle.position.set(0, 0.02, 0.17);
          sparkle.rotation.z = angle;
          eye.add(sparkle);
        }

        const upperLid = new THREE.Mesh(
          new THREE.BoxGeometry(0.24, 0.04, 0.02),
          hair
        );
        upperLid.position.set(0, 0.16, 0.12);
        upperLid.rotation.z = x < 0 ? 0.12 : -0.12;
        eye.add(upperLid);

        const brow = new THREE.Mesh(
          new THREE.BoxGeometry(0.15, 0.03, 0.02),
          button
        );
        brow.position.set(0, 0.26, 0.1);
        brow.rotation.z = x < 0 ? 0.24 : -0.24;
        eye.add(brow);

        character.add(eye);
      }

      createEye(-0.28);
      createEye(0.28);

      const blushLeft = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 16, 16),
        blush
      );
      blushLeft.scale.set(1.55, 0.55, 0.3);
      blushLeft.position.set(-0.45, 1.98, 0.77);
      character.add(blushLeft);

      const blushRight = blushLeft.clone();
      blushRight.position.x = 0.45;
      character.add(blushRight);

      const mouth = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.085, 0.12, 6, 10),
        mouthMat
      );
      mouth.scale.set(0.95, 1.35, 0.28);
      mouth.position.set(0, 1.86, 0.82);
      character.add(mouth);

      const mole = new THREE.Mesh(
        new THREE.SphereGeometry(0.024, 10, 10),
        eyeDark
      );
      mole.position.set(0.47, 1.99, 0.82);
      character.add(mole);

      function createLeg(x, forward = 0, raised = false) {
        const leg = new THREE.Group();

        const thigh = new THREE.Mesh(
          new THREE.CylinderGeometry(0.12, 0.11, 0.56, 16),
          skin
        );
        thigh.position.y = 0.42;
        thigh.castShadow = true;
        leg.add(thigh);

        const sockShape = new THREE.Mesh(
          new THREE.CylinderGeometry(0.14, 0.12, raised ? 0.62 : 0.46, 16),
          sock
        );
        sockShape.position.y = raised ? 0.07 : 0.14;
        sockShape.castShadow = true;
        leg.add(sockShape);

        const shoeBase = new THREE.Mesh(
          new THREE.SphereGeometry(0.19, 18, 18),
          shoe
        );
        shoeBase.scale.set(1.28, 0.78, 1.58);
        shoeBase.position.set(0, -0.17, 0.12);
        shoeBase.castShadow = true;
        leg.add(shoeBase);

        const shoeSole = new THREE.Mesh(
          new THREE.BoxGeometry(0.36, 0.05, 0.48),
          sole
        );
        shoeSole.position.set(0, -0.24, 0.12);
        shoeSole.castShadow = true;
        leg.add(shoeSole);

        leg.position.set(x, 0.04, forward);
        return leg;
      }

      const leftLeg = createLeg(-0.13, -0.02, false);
      leftLeg.rotation.z = 0.02;
      body.add(leftLeg);

      const rightLeg = createLeg(0.16, 0.36, true);
      rightLeg.rotation.x = -0.62;
      rightLeg.rotation.z = -0.08;
      body.add(rightLeg);

      function createHand(side) {
        const hand = new THREE.Group();
        const palm = new THREE.Mesh(
          new THREE.SphereGeometry(0.1, 16, 16),
          skin
        );
        palm.scale.set(1.1, 1.12, 0.45);
        palm.castShadow = true;
        hand.add(palm);

        const fingerOffsets = [
          [-0.1 * side, 0.03, -0.52],
          [-0.03 * side, 0.1, -0.2],
          [0.04 * side, 0.1, 0.08],
          [0.11 * side, 0.04, 0.38],
        ];
        for (const [x, y, rot] of fingerOffsets) {
          const finger = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.022, 0.09, 4, 10),
            skin
          );
          finger.position.set(x, y, 0.015);
          finger.rotation.z = rot;
          finger.castShadow = true;
          hand.add(finger);
        }
        return hand;
      }

      function createArm(options) {
        const { side, waving, forwardTilt = 0 } = options;
        const armPivot = new THREE.Object3D();
        armPivot.position.set(side * 0.46, 1.47, 0.05);

        const upperSleeve = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.11, 0.18, 6, 12),
          cardigan
        );
        upperSleeve.position.set(0, -0.12, 0.02);
        upperSleeve.castShadow = true;
        armPivot.add(upperSleeve);

        const forearm = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.08, 0.24, 6, 10),
          skin
        );
        forearm.position.set(0, -0.32, 0.03);
        forearm.castShadow = true;
        armPivot.add(forearm);

        const hand = createHand(side);
        hand.position.set(0, -0.52, 0.05);
        armPivot.add(hand);

        if (waving) {
          armPivot.rotation.z = -0.78;
          armPivot.rotation.x = 0.62;
          armPivot.rotation.y = -0.22;
        } else {
          armPivot.rotation.z = 1.0;
          armPivot.rotation.x = forwardTilt;
          armPivot.rotation.y = 0.28;
        }

        body.add(armPivot);
        return armPivot;
      }

      const leftArmPivot = createArm({ side: -1, waving: false, forwardTilt: -0.28 });
      const rightArmPivot = createArm({ side: 1, waving: true });

      body.position.y = 0.02;
      character.position.y = 0.02;
      character.rotation.y = 0.08;

      const clock = new THREE.Clock();

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      }

      window.addEventListener("resize", onResize);

      function animate() {
        const elapsed = clock.getElapsedTime();
        const wave = Math.sin(elapsed * 4.6) * 0.42;

        rightArmPivot.rotation.z = -0.8 + wave * 0.88;
        rightArmPivot.rotation.x = 0.62 + Math.cos(elapsed * 4.6) * 0.08;
        rightArmPivot.rotation.y = -0.22 + Math.sin(elapsed * 2.3) * 0.03;
        leftArmPivot.rotation.z = 1 + Math.sin(elapsed * 1.2) * 0.02;

        body.rotation.z = Math.sin(elapsed * 1.7) * 0.008;
        character.position.y = 0.02 + Math.sin(elapsed * 1.7) * 0.02;
        character.rotation.y = 0.08 + Math.sin(elapsed * 0.8) * 0.025;

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
