<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f7eedf" />
    <title>Three.js Waving Character</title>
    <style>
      :root {
        --cream: #f7eedf;
        --cream-deep: #efd9b8;
        --grass: #8cc76f;
        --grass-shadow: #6ba54e;
        --text: #7d4f28;
        --ui-bg: rgba(255, 250, 240, 0.88);
        --ui-border: rgba(125, 79, 40, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #fff7ec 0%, var(--cream) 58%, #f0e2ca 100%);
        font-family: "Trebuchet MS", "Avenir Next", "Hiragino Sans", sans-serif;
        color: var(--text);
      }

      body {
        position: relative;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hud {
        position: absolute;
        top: max(16px, env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 420px);
        padding: 14px 16px;
        border: 1px solid var(--ui-border);
        border-radius: 20px;
        background: var(--ui-bg);
        backdrop-filter: blur(10px);
        text-align: center;
        box-shadow: 0 12px 32px rgba(125, 79, 40, 0.08);
        pointer-events: none;
      }

      .hud h1 {
        margin: 0;
        font-size: clamp(1.1rem, 4vw, 1.55rem);
        line-height: 1.15;
        letter-spacing: 0.02em;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: clamp(0.82rem, 3vw, 0.95rem);
        opacity: 0.82;
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <h1>Three.js waving character</h1>
      <p>Drag to rotate / Pinch to zoom</p>
    </div>
    <div id="app"></div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.166.1";
      import { OrbitControls } from "https://esm.sh/three@0.166.1/examples/jsm/controls/OrbitControls.js";

      const container = document.getElementById("app");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf7eedf);
      scene.fog = new THREE.Fog(0xf7eedf, 9, 16);

      const camera = new THREE.PerspectiveCamera(
        35,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 2.45, 7.6);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.minDistance = 6;
      controls.maxDistance = 9.2;
      controls.minPolarAngle = 0.85;
      controls.maxPolarAngle = 1.35;
      controls.target.set(0, 1.55, 0);
      controls.rotateSpeed = 0.75;
      controls.zoomSpeed = 0.9;

      const ambientLight = new THREE.HemisphereLight(0xfff5e8, 0x95bb72, 1.7);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.55);
      keyLight.position.set(4.2, 7.5, 4.8);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.set(1024, 1024);
      keyLight.shadow.camera.near = 1;
      keyLight.shadow.camera.far = 20;
      keyLight.shadow.camera.left = -5;
      keyLight.shadow.camera.right = 5;
      keyLight.shadow.camera.top = 5;
      keyLight.shadow.camera.bottom = -5;
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0xffddb6, 0.5);
      fillLight.position.set(-4, 3, 2);
      scene.add(fillLight);

      const ground = new THREE.Mesh(
        new THREE.CylinderGeometry(5.2, 5.5, 0.36, 48),
        new THREE.MeshStandardMaterial({
          color: 0x88c86a,
          roughness: 0.95,
        })
      );
      ground.position.y = -0.18;
      ground.receiveShadow = true;
      scene.add(ground);

      const grassTop = new THREE.Mesh(
        new THREE.CircleGeometry(5, 48),
        new THREE.MeshStandardMaterial({
          color: 0x96d773,
          roughness: 1,
        })
      );
      grassTop.rotation.x = -Math.PI / 2;
      grassTop.position.y = 0.002;
      grassTop.receiveShadow = true;
      scene.add(grassTop);

      const character = new THREE.Group();
      scene.add(character);

      const skin = new THREE.MeshStandardMaterial({ color: 0xf5be92, roughness: 0.96 });
      const hair = new THREE.MeshStandardMaterial({ color: 0x2c2628, roughness: 1 });
      const shirt = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.94 });
      const shorts = new THREE.MeshStandardMaterial({ color: 0x24365a, roughness: 0.96 });
      const shoe = new THREE.MeshStandardMaterial({ color: 0xf7f6f2, roughness: 0.9 });
      const sole = new THREE.MeshStandardMaterial({ color: 0xe0d7cf, roughness: 1 });
      const glasses = new THREE.MeshStandardMaterial({ color: 0x463329, roughness: 0.72 });
      const eyeDark = new THREE.MeshStandardMaterial({ color: 0x251c18, roughness: 1 });
      const blush = new THREE.MeshStandardMaterial({
        color: 0xf0a39c,
        roughness: 1,
        transparent: true,
        opacity: 0.36,
      });

      const body = new THREE.Group();
      body.position.y = 0.04;
      character.add(body);

      const torso = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.44, 0.56, 8, 16),
        shirt
      );
      torso.scale.set(1.02, 1.02, 0.88);
      torso.position.y = 1.2;
      torso.castShadow = true;
      body.add(torso);

      const hem = new THREE.Mesh(
        new THREE.BoxGeometry(0.72, 0.08, 0.5),
        shirt
      );
      hem.position.set(0, 0.88, 0);
      body.add(hem);

      const shortsMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.76, 0.38, 0.52),
        shorts
      );
      shortsMesh.position.set(0, 0.74, 0);
      shortsMesh.castShadow = true;
      body.add(shortsMesh);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.84, 32, 32),
        skin
      );
      head.scale.set(1, 1.03, 0.95);
      head.position.y = 2.26;
      head.castShadow = true;
      character.add(head);

      const earLeft = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), skin);
      earLeft.position.set(-0.8, 2.18, 0.02);
      earLeft.castShadow = true;
      character.add(earLeft);
      const earRight = earLeft.clone();
      earRight.position.x = 0.8;
      character.add(earRight);

      const topHair = new THREE.Mesh(
        new THREE.SphereGeometry(0.9, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.58),
        hair
      );
      topHair.position.set(0, 2.52, -0.04);
      topHair.rotation.x = -0.08;
      topHair.castShadow = true;
      character.add(topHair);

      const backHair = new THREE.Mesh(
        new THREE.CylinderGeometry(0.64, 0.7, 0.72, 28),
        hair
      );
      backHair.position.set(0, 2.0, -0.16);
      backHair.scale.set(1, 1, 0.64);
      backHair.castShadow = true;
      character.add(backHair);

      const sideHairLeft = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.2, 0.34, 6, 14),
        hair
      );
      sideHairLeft.scale.set(1.12, 1.34, 0.82);
      sideHairLeft.position.set(-0.55, 2.19, 0.22);
      sideHairLeft.rotation.z = 0.22;
      sideHairLeft.castShadow = true;
      character.add(sideHairLeft);

      const sideHairRight = sideHairLeft.clone();
      sideHairRight.position.x = 0.55;
      sideHairRight.rotation.z = -0.22;
      character.add(sideHairRight);

      const partLeft = new THREE.Mesh(
        new THREE.SphereGeometry(0.36, 24, 24),
        hair
      );
      partLeft.scale.set(1.08, 0.58, 0.6);
      partLeft.position.set(-0.22, 2.42, 0.64);
      partLeft.rotation.z = -0.08;
      partLeft.castShadow = true;
      character.add(partLeft);

      const partRight = partLeft.clone();
      partRight.position.x = 0.22;
      partRight.rotation.z = 0.08;
      character.add(partRight);

      const fringeMid = new THREE.Mesh(
        new THREE.SphereGeometry(0.16, 18, 18),
        hair
      );
      fringeMid.scale.set(0.95, 0.4, 0.42);
      fringeMid.position.set(0, 2.34, 0.72);
      character.add(fringeMid);

      for (const [x, rot] of [
        [-0.26, -0.18],
        [-0.1, -0.08],
        [0.1, 0.08],
        [0.26, 0.18],
      ]) {
        const bang = new THREE.Mesh(
          new THREE.ConeGeometry(0.09, 0.24, 12),
          hair
        );
        bang.position.set(x, 2.16, 0.74);
        bang.rotation.x = Math.PI;
        bang.rotation.z = rot;
        bang.castShadow = true;
        character.add(bang);
      }

      function addEye(x) {
        const eyeWhite = new THREE.Mesh(
          new THREE.SphereGeometry(0.095, 18, 18),
          shirt
        );
        eyeWhite.scale.set(1.05, 1.18, 0.3);
        eyeWhite.position.set(x, 2.17, 0.76);
        character.add(eyeWhite);

        const pupil = new THREE.Mesh(
          new THREE.SphereGeometry(0.045, 14, 14),
          eyeDark
        );
        pupil.scale.set(1, 1.1, 0.26);
        pupil.position.set(x, 2.15, 0.84);
        character.add(pupil);
      }

      addEye(-0.22);
      addEye(0.22);

      const glassesGroup = new THREE.Group();
      glassesGroup.position.set(0, 2.12, 0.83);
      character.add(glassesGroup);

      const lensGeometry = new THREE.TorusGeometry(0.2, 0.028, 12, 24);
      const leftLens = new THREE.Mesh(lensGeometry, glasses);
      leftLens.position.x = -0.22;
      glassesGroup.add(leftLens);
      const rightLens = leftLens.clone();
      rightLens.position.x = 0.22;
      glassesGroup.add(rightLens);

      const bridge = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.026, 0.03),
        glasses
      );
      glassesGroup.add(bridge);

      const templeLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.02, 0.02),
        glasses
      );
      templeLeft.position.set(-0.41, 0.02, -0.05);
      templeLeft.rotation.y = 0.5;
      glassesGroup.add(templeLeft);
      const templeRight = templeLeft.clone();
      templeRight.position.x = 0.41;
      templeRight.rotation.y = -0.5;
      glassesGroup.add(templeRight);

      const nose = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 14, 14),
        skin
      );
      nose.scale.set(1, 0.8, 1.1);
      nose.position.set(0, 1.98, 0.8);
      character.add(nose);

      const blushLeft = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 16, 16),
        blush
      );
      blushLeft.scale.set(1.4, 0.5, 0.24);
      blushLeft.position.set(-0.42, 1.94, 0.75);
      character.add(blushLeft);
      const blushRight = blushLeft.clone();
      blushRight.position.x = 0.42;
      character.add(blushRight);

      const mouth = new THREE.Mesh(
        new THREE.TorusGeometry(0.065, 0.012, 8, 16, Math.PI),
        eyeDark
      );
      mouth.rotation.z = Math.PI;
      mouth.position.set(0, 1.82, 0.8);
      character.add(mouth);

      function createLeg(x, forward = 0, front = false) {
        const leg = new THREE.Group();

        const shin = new THREE.Mesh(
          new THREE.CylinderGeometry(0.11, 0.1, front ? 0.6 : 0.52, 16),
          skin
        );
        shin.position.y = 0.36;
        shin.castShadow = true;
        leg.add(shin);

        const shoeBase = new THREE.Mesh(
          new THREE.SphereGeometry(0.2, 18, 18),
          shoe
        );
        shoeBase.scale.set(front ? 1.32 : 1.18, 0.72, front ? 1.68 : 1.45);
        shoeBase.position.set(0, -0.02, front ? 0.16 : 0.12);
        shoeBase.castShadow = true;
        leg.add(shoeBase);

        const shoeSole = new THREE.Mesh(
          new THREE.BoxGeometry(front ? 0.42 : 0.34, 0.05, front ? 0.52 : 0.42),
          sole
        );
        shoeSole.position.set(0, -0.1, front ? 0.16 : 0.12);
        shoeSole.castShadow = true;
        leg.add(shoeSole);

        leg.position.set(x, 0.03, forward);
        return leg;
      }

      const leftLeg = createLeg(-0.16, 0.01, false);
      leftLeg.rotation.z = 0.02;
      body.add(leftLeg);

      const rightLeg = createLeg(0.16, 0.24, true);
      rightLeg.rotation.x = -0.34;
      rightLeg.rotation.z = -0.06;
      body.add(rightLeg);

      function createHand(open = false) {
        const hand = new THREE.Group();

        const palm = new THREE.Mesh(
          new THREE.SphereGeometry(0.11, 16, 16),
          skin
        );
        palm.scale.set(1.05, 1, 0.55);
        palm.castShadow = true;
        hand.add(palm);

        if (open) {
          for (const [x, y, rot] of [
            [-0.08, 0.03, -0.55],
            [-0.02, 0.1, -0.18],
            [0.04, 0.11, 0.12],
            [0.1, 0.05, 0.42],
          ]) {
            const finger = new THREE.Mesh(
              new THREE.CapsuleGeometry(0.02, 0.08, 4, 10),
              skin
            );
            finger.position.set(x, y, 0.02);
            finger.rotation.z = rot;
            finger.castShadow = true;
            hand.add(finger);
          }
        }

        return hand;
      }

      function createArm(side, waving = false) {
        const pivot = new THREE.Object3D();
        pivot.position.set(side * 0.48, 1.38, 0.03);

        const upper = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.1, 0.22, 6, 12),
          shirt
        );
        upper.position.set(0, -0.14, 0);
        upper.castShadow = true;
        pivot.add(upper);

        const forearm = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.08, 0.22, 6, 10),
          skin
        );
        forearm.position.set(0, -0.34, 0.02);
        forearm.castShadow = true;
        pivot.add(forearm);

        const hand = createHand(waving);
        hand.position.set(0, -0.5, 0.04);
        pivot.add(hand);

        if (waving) {
          pivot.rotation.z = -0.74;
          pivot.rotation.x = 0.48;
          pivot.rotation.y = -0.18;
        } else {
          pivot.rotation.z = 0.22;
          pivot.rotation.x = -0.18;
        }

        body.add(pivot);
        return pivot;
      }

      const leftArmPivot = createArm(-1, false);
      const rightArmPivot = createArm(1, true);

      character.position.y = 0.02;
      character.rotation.y = 0.12;

      const clock = new THREE.Clock();

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      }

      window.addEventListener("resize", onResize);

      function animate() {
        const elapsed = clock.getElapsedTime();
        const wave = Math.sin(elapsed * 4.6) * 0.42;

        rightArmPivot.rotation.z = -0.76 + wave * 0.7;
        rightArmPivot.rotation.x = 0.48 + Math.cos(elapsed * 4.6) * 0.06;
        rightArmPivot.rotation.y = -0.18 + Math.sin(elapsed * 2.3) * 0.025;
        leftArmPivot.rotation.z = 0.22 + Math.sin(elapsed * 1.2) * 0.015;
        leftArmPivot.rotation.x = -0.18 + Math.cos(elapsed * 1.2) * 0.01;

        body.rotation.z = Math.sin(elapsed * 1.7) * 0.006;
        character.position.y = 0.02 + Math.sin(elapsed * 1.7) * 0.015;
        character.rotation.y = 0.12 + Math.sin(elapsed * 0.8) * 0.018;

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
