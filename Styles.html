<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <title>UIテイスト比較 · Fairway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif&family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
    :root { color-scheme: light; }
    html, body { margin: 0; padding: 0; background: #F3F1EC; font-family: 'Inter', system-ui, sans-serif; color: #171717; }
    * { box-sizing: border-box; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { scrollbar-width: none; }

    .page-header {
      padding: 36px 40px 24px;
      border-bottom: 1px solid #E5E0D6;
      background: #F3F1EC;
      position: sticky; top: 0; z-index: 10;
    }
    .page-header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.6px; }
    .page-header .sub { color: #78736A; font-size: 13px; margin-top: 6px; }
    .screen-tabs {
      display: flex; gap: 6px; margin-top: 18px;
    }
    .screen-tabs button {
      background: transparent; border: 1px solid #D6D1C5;
      color: #171717; padding: 7px 14px;
      font: inherit; font-size: 12px; font-weight: 500;
      border-radius: 999px; cursor: pointer;
    }
    .screen-tabs button.active { background: #171717; color: #F3F1EC; border-color: #171717; }

    .rail {
      padding: 28px 40px 64px;
      overflow-x: auto;
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }
    .col {
      flex-shrink: 0;
      width: 340px;
    }
    .col .label {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 14px;
    }
    .col .label .no {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: #A39E93; font-weight: 500;
      letter-spacing: 0.5px;
    }
    .col .label .name {
      font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
    }
    .col .meta {
      font-size: 12px; color: #78736A;
      line-height: 1.5; margin-bottom: 16px; min-height: 36px;
    }
    .phone {
      width: 340px; height: 720px;
      border-radius: 40px;
      background: #111;
      padding: 8px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,0.35), 0 12px 24px -12px rgba(0,0,0,0.2);
    }
    .phone-screen {
      width: 100%; height: 100%;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      background: #fff;
    }
    /* Generic notch */
    .notch {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 90px; height: 22px;
      background: #111; border-radius: 999px; z-index: 20;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="screens/styles/_data.jsx"></script>
  <script type="text/babel" src="screens/styles/pattern-0-current.jsx"></script>
  <script type="text/babel" src="screens/styles/pattern-1-linear.jsx"></script>
  <script type="text/babel" src="screens/styles/pattern-2-fitness.jsx"></script>
  <script type="text/babel" src="screens/styles/pattern-3-strava.jsx"></script>
  <script type="text/babel" src="screens/styles/pattern-4-nike.jsx"></script>
  <script type="text/babel" src="screens/styles/pattern-5-editorial.jsx"></script>

  <script type="text/babel" data-screen-label="Styles Compare">
    const { useState } = React;

    const PATTERNS = [
      { key: 'current',  no: '00', name: '当初案（現行）',     meta: 'ゴルフらしい落ち着き。緑ベース、朴訥な新聞カード。', Comp: window.Pattern0Current },
      { key: 'linear',   no: '01', name: 'Linear 風',           meta: '超ミニマル・グレースケール・タイポ中心。余白で語る。', Comp: window.Pattern1Linear },
      { key: 'fitness',  no: '02', name: 'Apple Fitness 風',    meta: '黒背景 + 色鮮やかなリング。達成感と日課性。',         Comp: window.Pattern2Fitness },
      { key: 'strava',   no: '03', name: 'Strava 風',           meta: 'フィード型。ラウンドごとにカード、SNS的な粒度。',     Comp: window.Pattern3Strava },
      { key: 'nike',     no: '04', name: 'Nike Run 風',         meta: '巨大タイポ + モノクロ。駆動感と大胆さ。',              Comp: window.Pattern4Nike },
      { key: 'edit',     no: '05', name: 'エディトリアル風',     meta: '雑誌のような非対称レイアウト。セリフ + 引用風。',      Comp: window.Pattern5Editorial },
    ];

    const SCREENS = [
      { k: 'home',     label: 'Home' },
      { k: 'analysis', label: '分析' },
      { k: 'input',    label: 'ラウンド入力' },
    ];

    function App() {
      const [screen, setScreen] = useState('home');
      return (
        <div data-screen-label="Styles Compare">
          <div className="page-header">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 40, flexWrap: 'wrap' }}>
              <div>
                <h1>UIテイスト比較</h1>
                <div className="sub">6パターンを横に並べて比較。画面切替で Home / 分析 / ラウンド入力 を見渡せます。</div>
              </div>
              <div className="screen-tabs">
                {SCREENS.map(s => (
                  <button key={s.k} onClick={()=>setScreen(s.k)} className={screen===s.k ? 'active' : ''}>
                    {s.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="rail hide-scroll">
            {PATTERNS.map(p => (
              <div key={p.key} className="col">
                <div className="label">
                  <span className="no">{p.no}</span>
                  <span className="name">{p.name}</span>
                </div>
                <div className="meta">{p.meta}</div>
                <div className="phone">
                  <div className="phone-screen">
                    {p.Comp ? <p.Comp screen={screen}/> : <div style={{padding:40, color:'#aaa'}}>Not implemented</div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
